openapi: 3.0.1
info:
  description: "Scan text, files, and URLs for multiple threat types in a single API\
    \ call."
  title: multithreatscanapi
  version: v1
servers:
- url: /
security:
- Apikey: []
paths:
  /multi-threat-scan/text:
    post:
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/MultiThreatTextRequest'
          text/json:
            schema:
              $ref: '#/components/schemas/MultiThreatTextRequest'
          application/*+json:
            schema:
              $ref: '#/components/schemas/MultiThreatTextRequest'
        description: Text scan request with content and scan configuration
        required: false
      responses:
        "200":
          content:
            text/plain:
              schema:
                $ref: '#/components/schemas/MultiThreatTextResponse'
            application/json:
              schema:
                $ref: '#/components/schemas/MultiThreatTextResponse'
            text/json:
              schema:
                $ref: '#/components/schemas/MultiThreatTextResponse'
          description: OK
      summary: "Scan text for multiple threat types including viruses, phishing, spam,\
        \ DLP, and policy violations in a single API call."
      tags:
      - MultiThreat
      x-codegen-request-body-name: body
  /multi-threat-scan/file:
    post:
      requestBody:
        content:
          multipart/form-data:
            schema:
              $ref: '#/components/schemas/_multi_threat_scan_file_post_request'
        required: true
      responses:
        "200":
          content:
            text/plain:
              schema:
                $ref: '#/components/schemas/MultiThreatFileResponse'
            application/json:
              schema:
                $ref: '#/components/schemas/MultiThreatFileResponse'
            text/json:
              schema:
                $ref: '#/components/schemas/MultiThreatFileResponse'
          description: OK
      summary: "Scan a file for multiple threat types including viruses, NSFW, AI-generated\
        \ content, fraud, phishing, spam, DLP, and policy violations in a single API\
        \ call."
      tags:
      - MultiThreat
  /multi-threat-scan/url:
    post:
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/MultiThreatUrlRequest'
          text/json:
            schema:
              $ref: '#/components/schemas/MultiThreatUrlRequest'
          application/*+json:
            schema:
              $ref: '#/components/schemas/MultiThreatUrlRequest'
        description: URL scan request with URL and scan configuration
        required: false
      responses:
        "200":
          content:
            text/plain:
              schema:
                $ref: '#/components/schemas/MultiThreatUrlResponse'
            application/json:
              schema:
                $ref: '#/components/schemas/MultiThreatUrlResponse'
            text/json:
              schema:
                $ref: '#/components/schemas/MultiThreatUrlResponse'
          description: OK
      summary: "Scan a URL for multiple threat types including viruses, phishing,\
        \ and policy violations in a single API call. Optionally download and scan\
        \ the file at the URL."
      tags:
      - MultiThreat
      x-codegen-request-body-name: body
components:
  schemas:
    AiContentDetectionConfig:
      additionalProperties: false
      description: AI-generated content detection configuration
      example:
        Enabled: true
      properties:
        Enabled:
          description: Enable AI content detection
          example: true
          type: boolean
      type: object
    AiContentDetectionResult:
      additionalProperties: false
      description: AI content detection result
      example:
        AiConfidenceLevel: 6.027456183070403
        DetectedFileType: DetectedFileType
        Skipped: true
        Enabled: true
        SkipReason: SkipReason
        ContainsAiGeneratedContent: true
        Successful: true
        Warnings:
        - Warnings
        - Warnings
        CleanResult: true
        Verdict: Verdict
        Provider: Provider
        Generator: Generator
      properties:
        Enabled:
          description: Whether this scan was enabled
          type: boolean
        Successful:
          description: Whether this scan completed successfully
          type: boolean
        CleanResult:
          description: True if no AI-generated content was detected
          type: boolean
        ContainsAiGeneratedContent:
          description: Content appears to be AI-generated
          type: boolean
        AiConfidenceLevel:
          description: Confidence level of AI content detection (0.0 to 1.0)
          format: double
          type: number
        Skipped:
          description: Scan was skipped
          type: boolean
        SkipReason:
          description: Reason the scan was skipped
          type: string
        Verdict:
          description: "Categorical assessment of whether the file appears AI-generated\
            \ based on its\r\nembedded metadata. One of: NoDeterministicAiMetadataFound,\
            \ VerifiedAiGenerated,\r\nVerifiedAiEditedOrComposite, LikelyAiGenerated,\
            \ LikelyAiEditedOrComposite,\r\nPossibleAiGenerated, ConflictingSignals,\
            \ MetadataUnavailableOrUnreadable,\r\nUnsupportedFileType."
          type: string
        Provider:
          description: "AI provider name (for example, \"OpenAI\", \"Adobe\", \"Google\"\
            , \"Microsoft\").\r\nEmpty when the metadata does not identify a provider."
          type: string
        Generator:
          description: "AI tool or product name (for example, \"ChatGPT\", \"Adobe\
            \ Firefly\", \"Stable\r\nDiffusion\"). Empty when the metadata does not\
            \ identify a specific tool."
          type: string
        Warnings:
          description: "Non-fatal warnings produced during analysis, intended for\
            \ diagnostic display.\r\nEmpty when no warnings were produced."
          items:
            type: string
          type: array
        DetectedFileType:
          description: "File type detected from the file's content (for example, \"\
            jpeg\", \"png\", \"pdf\").\r\nMay differ from the file's name extension\
            \ when the content was misnamed."
          type: string
      type: object
